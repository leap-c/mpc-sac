name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      leap_c_ref:
        description: leap-c ref to install
        required: false
        default: main
      leap_c_lab_ref:
        description: leap-c-lab ref to install
        required: false
        default: main
      test_env:
        description: Script-test env selector
        required: false
        default: cartpole
      test_script:
        description: Script-test script selector
        required: false
        default: sac
      test_controller:
        description: Script-test controller selector
        required: false
        default: cartpole
  repository_dispatch:
    types: [leap-c-updated, leap-c-lab-updated, downstream-ci]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check linting violations
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "check --config pyproject.toml --output-format=github ."
      - name: Check formatting violations
        run: ruff format --diff --config pyproject.toml .

  test:
    name: test py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/leap-c/acados-ci:ubuntu24.04
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      LEAP_C_REF: ${{ github.event.client_payload.leap_c_ref || github.event.inputs.leap_c_ref || 'main' }}
      LEAP_C_LAB_REF: ${{ github.event.client_payload.leap_c_lab_ref || github.event.inputs.leap_c_lab_ref || 'main' }}
      TEST_ENV: ${{ github.event.client_payload.test_env || github.event.inputs.test_env || 'cartpole' }}
      TEST_SCRIPT: ${{ github.event.client_payload.test_script || github.event.inputs.test_script || 'sac' }}
      TEST_CONTROLLER: ${{ github.event.client_payload.test_controller || github.event.inputs.test_controller || 'cartpole' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"

      - name: Install Python dependencies
        run: |
          uv pip install /opt/acados/interfaces/acados_template
          uv pip install "git+https://github.com/leap-c/leap-c.git@${LEAP_C_REF}"
          uv pip install "git+https://github.com/leap-c/leap-c-lab.git@${LEAP_C_LAB_REF}"
          uv pip install -e ".[dev]"

      - name: Unit tests
        run: pytest tests/mpc_sac -v --ignore=tests/mpc_sac/test_scripts.py

      - name: Script smoke tests
        run: pytest tests/mpc_sac/test_scripts.py -v -s
